# Flask 僅 web；MinIO 在專案外（區網 / 雲端 / 宿主機）
# 設定請見 .env（由 .env.example 複製）；勿將含密碼的 .env 提交版本庫
# 使用：docker compose up --build
# 可選 Django：docker compose --profile django up --build

services:
  web:
    build: .
    image: ${DOCKER_IMAGE:-mikao07/deltalake_spark_minio_flask:latest}
    container_name: car_rental_flask_app
    ports:
      - "${WEB_PORT:-5000}:${PORT:-5000}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-5000}
      FLASK_DEBUG: ${FLASK_DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://127.0.0.1:9000}
      MINIO_ENDPOINT_CLIENT: ${MINIO_ENDPOINT_CLIENT:-127.0.0.1:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      BUCKET_NAME: ${BUCKET_NAME:-data-lake}
      BRONZE_TABLE_PATH: ${BRONZE_TABLE_PATH:-s3a://data-lake/bronze/raw_features/}
      SILVER_TABLE_PATH: ${SILVER_TABLE_PATH:-s3a://data-lake/silver/cleaned_features/}
      SILVER_OCR_TABLE_PATH: ${SILVER_OCR_TABLE_PATH:-s3a://data-lake/silver/ocr_features/}
      JIEBA_ZIP_PATH: ${JIEBA_ZIP_PATH:-}
      RAW_IMAGE_PREFIX: ${RAW_IMAGE_PREFIX:-raw/images/}
      RAW_IMAGES_PATH: ${RAW_IMAGES_PATH:-s3a://data-lake/raw/images/}
      OCR_LANG: ${OCR_LANG:-chi_tra+eng}
      OCR_PSM: ${OCR_PSM:-6}
      OCR_SCALE_MIN_SIDE: ${OCR_SCALE_MIN_SIDE:-0}
      OCR_CONTRAST: ${OCR_CONTRAST:-1.5}
      OCR_SHARPNESS: ${OCR_SHARPNESS:-1.0}
      OCR_BINARIZE: ${OCR_BINARIZE:-off}
      OCR_PREPROCESS_VERSION: ${OCR_PREPROCESS_VERSION:-v1.1}
      OCR_PRESET_ROUTER_ENABLED: ${OCR_PRESET_ROUTER_ENABLED:-false}
      TESSERACT_CMD: ${TESSERACT_CMD:-}
      UPLOAD_ON_DUPLICATE: ${UPLOAD_ON_DUPLICATE:-suffix}
      S3A_PATH_STYLE_ACCESS: ${S3A_PATH_STYLE_ACCESS:-true}
      S3A_CONNECTION_SSL_ENABLED: ${S3A_CONNECTION_SSL_ENABLED:-false}
      S3A_IMPL: ${S3A_IMPL:-org.apache.hadoop.fs.s3a.S3AFileSystem}
      S3A_ENDPOINT_REGION: ${S3A_ENDPOINT_REGION:-us-east-1}
      ALLOWED_DELTA_PATH_PREFIXES: ${ALLOWED_DELTA_PATH_PREFIXES:-s3a://data-lake/}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    networks:
      - backend_net
    restart: always

  django_app:
    profiles: ["django"]
    build: ./your_django_folder
    container_name: feedback_engine_django
    ports:
      - "8000:8000"
    environment:
      - ANALYTICS_API_URL=http://web:${PORT:-5000}
    depends_on:
      - web
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge
