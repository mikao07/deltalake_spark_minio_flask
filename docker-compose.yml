# Flask + 外部 MinIO（Ubuntu）；可選同時啟動 Django（見下方 profile）
# 僅 Web：docker compose up --build
# 含 Django：docker compose --profile django up --build

services:
  web:
    build: .
    container_name: car_rental_flask_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PORT: "5000"
      FLASK_DEBUG: "true"
      LOG_LEVEL: "INFO"
      # 指向區網 MinIO（容器內須能連到該 IP）
      MINIO_ENDPOINT: "http://192.168.137.130:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      BUCKET_NAME: "data-lake"
      BRONZE_TABLE_PATH: "s3a://data-lake/bronze/raw_features/"
      S3A_PATH_STYLE_ACCESS: "true"
      S3A_CONNECTION_SSL_ENABLED: "false"
      S3A_IMPL: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    networks:
      - backend_net
    restart: always

  # 將你的 Django 專案放在此路徑並具備 Dockerfile 後再啟用：
  # docker compose --profile django up --build
  django_app:
    profiles: ["django"]
    build: ./your_django_folder
    container_name: feedback_engine_django
    ports:
      - "8000:8000"
    environment:
      - ANALYTICS_API_URL=http://web:5000
    depends_on:
      - web
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge
