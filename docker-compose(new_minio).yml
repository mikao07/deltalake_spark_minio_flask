# 本機一鍵：MinIO + Flask/Spark 應用
# 使用：docker compose up --build
#
# 環境變數可透過同目錄 .env 覆寫（勿把真實密碼提交版本庫）
# 此版本-在 Windows 本地啟動一個全新的 MinIO 容器

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  # 等待 MinIO 可連線後建立 bucket（與 BUCKET_NAME 一致）
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET_NAME: ${BUCKET_NAME:-data-lake}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        i=0
        while [ $$i -lt 60 ]; do
          if mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; then
            break
          fi
          i=$$((i + 1))
          sleep 1
        done
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" \
          || { echo "minio-init: 無法連線 MinIO（已重試）"; exit 1; }
        mc mb "local/$$BUCKET_NAME" --ignore-existing || true
        exit 0

  web:
    build: .
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment:
      PORT: "5000"
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      BUCKET_NAME: ${BUCKET_NAME:-data-lake}
      BRONZE_TABLE_PATH: ${BRONZE_TABLE_PATH:-s3a://data-lake/bronze/raw_features/}
      SILVER_TABLE_PATH: ${SILVER_TABLE_PATH:-s3a://data-lake/silver/cleaned_features/}
      SILVER_OCR_TABLE_PATH: ${SILVER_OCR_TABLE_PATH:-s3a://data-lake/silver/ocr_features/}
      S3A_PATH_STYLE_ACCESS: "true"
      S3A_CONNECTION_SSL_ENABLED: "false"
      # 與容器內 BUCKET 對齊，避免誤操作其他 prefix
      ALLOWED_DELTA_PATH_PREFIXES: ${ALLOWED_DELTA_PATH_PREFIXES:-s3a://data-lake/}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    depends_on:
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

volumes:
  minio_data:
