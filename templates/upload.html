<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>上傳圖片至 MinIO - OCR數據分析系統</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4" style="max-width: 800px">
      <nav class="mb-3 small">
        <a href="{{ url_for('index') }}">← 返回 Dashboard</a>
      </nav>

      <h1 class="h4 mb-3">上傳圖片至 MinIO（raw/images）</h1>
      <p class="text-muted small mb-4">
        此頁透過瀏覽器呼叫 <code>POST /api/upload/images</code>，檔案會寫入設定的 bucket 與
        <code>RAW_IMAGE_PREFIX</code>。若已設定 <code>ADMIN_TOKEN</code>，請在下方填寫後再上傳。
      </p>

      <form id="upload-form" class="card shadow-sm">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">dataset_id（必填）</label>
            <div class="input-group">
              <input
                class="form-control"
                type="text"
                id="dataset_id"
                name="dataset_id"
                placeholder="例如：invoice_ocr"
                autocomplete="off"
                required
              />
              <button class="btn btn-outline-secondary" type="button" id="btn-load-datasets">載入既有ID</button>
            </div>
            <div class="form-text">僅允許英數、-、_；上傳路徑會是 raw/images/{dataset_id}/...</div>
          </div>
          <div class="mb-3">
            <label class="form-label">選擇既有 dataset_id（可選）</label>
            <select class="form-select" id="dataset_id_select">
              <option value="">-- 請先按「載入既有ID」或直接手動輸入 --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">選擇圖片（可多選）</label>
            <input class="form-control" type="file" id="files" name="files" accept="image/*" multiple required />
          </div>
          <div class="mb-3">
            <label class="form-label">子資料夾（可選）</label>
            <input
              class="form-control"
              type="text"
              id="subfolder"
              name="subfolder"
              placeholder="例如：batch2026"
              autocomplete="off"
            />
            <div class="form-text">會變成 raw/images/{dataset_id}/子資料夾/檔名</div>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="run_ocr" name="run_ocr" />
            <label class="form-check-label" for="run_ocr">上傳後執行 Bronze OCR（Spark，可能較久）</label>
          </div>
          <div class="mb-3">
            <label class="form-label">同名物件已存在時（MinIO）</label>
            <select class="form-select" id="on_duplicate" name="on_duplicate">
              <option value="suffix" selected>自動改名加時間戳（建議）</option>
              <option value="overwrite">覆寫同名檔</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">OCR 寫入模式（僅在勾選上傳後 OCR 時）</label>
            <select class="form-select" id="write_mode" name="write_mode">
              <option value="append" selected>append（追加至 Bronze，不覆寫整表）</option>
              <option value="overwrite">overwrite（覆寫整張 Bronze 表，慎用）</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">管理 Token（可選）</label>
            <input
              class="form-control"
              type="password"
              id="admin_token"
              name="admin_token"
              placeholder="若設定了 ADMIN_TOKEN 環境變數"
              autocomplete="off"
            />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-submit">上傳</button>
        </div>
      </form>

      <div id="result-wrap" class="mt-4 d-none">
        <h2 class="h6 text-secondary mb-2">上傳結果</h2>
        <div class="table-responsive border rounded bg-white shadow-sm">
          <table class="table table-sm table-striped align-middle mb-0" id="result-table">
            <thead class="table-light">
              <tr>
                <th scope="col">資料夾（object key 路徑）</th>
                <th scope="col">檔案名稱</th>
                <th scope="col">狀態</th>
              </tr>
            </thead>
            <tbody id="result-tbody"></tbody>
          </table>
        </div>
        <p class="small text-muted mt-2 mb-0 d-none" id="ocr-note"></p>
      </div>

      <div class="card shadow-sm mt-4">
        <div class="card-body">
          <h2 class="h6 mb-3">手動執行 OCR（只針對單一 dataset_id）</h2>
          <div class="row g-2 align-items-end">
            <div class="col-12 col-md-6">
              <label class="form-label">dataset_id</label>
              <input class="form-control" id="ocr_dataset_id" placeholder="例如：invoice_ocr" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">write_mode</label>
              <select class="form-select" id="ocr_write_mode">
                <option value="append" selected>append</option>
                <option value="overwrite">overwrite</option>
              </select>
            </div>
            <div class="col-12 col-md-2 d-grid">
              <button type="button" class="btn btn-outline-primary" id="btn-run-ocr">執行 OCR</button>
            </div>
          </div>
          <p class="small text-muted mt-2 mb-0" id="manual-ocr-note"></p>
        </div>
      </div>
    </div>

    <script>
      function splitObjectKey(objectKey) {
        if (!objectKey) return { folder: "—", name: "—" };
        const i = objectKey.lastIndexOf("/");
        if (i === -1) return { folder: "（bucket 根下）", name: objectKey };
        return { folder: objectKey.slice(0, i), name: objectKey.slice(i + 1) };
      }

      function appendRow(tbody, folder, fileName, statusText, isOk) {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td class=\"text-break small\">" +
          escapeHtml(folder) +
          "</td><td class=\"text-break small\">" +
          escapeHtml(fileName) +
          "</td><td><span class=\"badge " +
          (isOk ? "bg-success" : "bg-danger") +
          "\">" +
          escapeHtml(statusText) +
          "</span></td>";
        tbody.appendChild(tr);
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      document.getElementById("upload-form").addEventListener("submit", async function (e) {
        e.preventDefault();
        const btn = document.getElementById("btn-submit");
        const fileInput = document.getElementById("files");
        const tbody = document.getElementById("result-tbody");
        const wrap = document.getElementById("result-wrap");
        const ocrNote = document.getElementById("ocr-note");

        if (!fileInput.files || fileInput.files.length === 0) {
          alert("請選擇至少一個檔案。");
          return;
        }

        const datasetInput = document.getElementById("dataset_id");
        const datasetId = datasetInput.value.trim().toLowerCase();
        if (!datasetId) {
          alert("請先輸入 dataset_id。");
          datasetInput.focus();
          return;
        }
        const sub = document.getElementById("subfolder").value.trim();
        const onDup = document.getElementById("on_duplicate").value;
        const runOcr = document.getElementById("run_ocr").checked;
        const writeMode = document.getElementById("write_mode").value;
        const tok = document.getElementById("admin_token").value.trim();
        const headers = {};
        if (tok) headers["X-Admin-Token"] = tok;

        tbody.innerHTML = "";
        ocrNote.classList.add("d-none");
        ocrNote.textContent = "";
        wrap.classList.remove("d-none");

        btn.disabled = true;
        let anyUploaded = false;

        try {
          for (let i = 0; i < fileInput.files.length; i++) {
            const file = fileInput.files[i];
            const fd = new FormData();
            fd.append("file", file);
            fd.append("dataset_id", datasetId);
            if (sub) fd.append("subfolder", sub);
            fd.append("on_duplicate", onDup);

            const res = await fetch("/api/upload/images", { method: "POST", headers: headers, body: fd });
            const text = await res.text();
            let data = null;
            try {
              data = JSON.parse(text);
            } catch (_) {}

            const localName = file.name || "（未命名）";

            if (!res.ok) {
              const errMsg = data && data.error ? data.error : text.slice(0, 200) || res.statusText;
              const baseFolder = sub ? "raw/images/" + datasetId + "/" + sub : "raw/images/" + datasetId;
              appendRow(tbody, baseFolder, localName, "失敗：" + errMsg, false);
              continue;
            }

            const items = (data && data.uploaded) || [];
            const item = items[0];
            if (!item || !item.object_key) {
              appendRow(tbody, "—", localName, "失敗：回應格式異常", false);
              continue;
            }

            const parts = splitObjectKey(item.object_key);
            let statusLine = "成功";
            if (item.renamed_from_duplicate) {
              statusLine = "成功（已自動改名）";
            }
            appendRow(tbody, parts.folder, parts.name, statusLine, true);
            anyUploaded = true;
          }

          if (runOcr && anyUploaded) {
            const ocrHeaders = Object.assign({ "Content-Type": "application/json" }, headers);
            const ocrRes = await fetch("/delta/ocr/bronze/run", {
              method: "POST",
              headers: ocrHeaders,
              body: JSON.stringify({ dataset_id: datasetId, write_mode: writeMode, dry_run: false }),
            });
            const ocrText = await ocrRes.text();
            let ocrData = null;
            try {
              ocrData = JSON.parse(ocrText);
            } catch (_) {}
            ocrNote.classList.remove("d-none");
            if (ocrRes.ok && ocrData && ocrData.status === "ok") {
              ocrNote.textContent = "Bronze OCR：成功（write_mode=" + writeMode + "）";
              ocrNote.className = "small text-success mt-2 mb-0";
            } else {
              const em = ocrData && ocrData.error ? ocrData.error : ocrText.slice(0, 300);
              ocrNote.textContent = "Bronze OCR：失敗 — " + em;
              ocrNote.className = "small text-danger mt-2 mb-0";
            }
          }
        } catch (err) {
          appendRow(tbody, "—", "—", "失敗：" + String(err), false);
        } finally {
          btn.disabled = false;
        }
      });

      async function loadDatasetIds() {
        const tok = document.getElementById("admin_token").value.trim();
        const headers = {};
        if (tok) headers["X-Admin-Token"] = tok;
        const sel = document.getElementById("dataset_id_select");
        sel.innerHTML = '<option value="">-- 載入中 --</option>';
        try {
          const res = await fetch("/api/datasets", { headers });
          const txt = await res.text();
          let data = {};
          try {
            data = JSON.parse(txt);
          } catch (_) {}
          if (!res.ok) throw new Error((data && data.error) || txt || "載入失敗");
          const ids = (data && data.datasets) || [];
          sel.innerHTML = '<option value="">-- 選擇既有 dataset_id --</option>';
          ids.forEach((id) => {
            const opt = document.createElement("option");
            opt.value = id;
            opt.textContent = id;
            sel.appendChild(opt);
          });
          if (ids.length === 0) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "（目前沒有既有 ID，可直接手動輸入新 ID）";
            sel.appendChild(opt);
          }
        } catch (err) {
          sel.innerHTML = '<option value="">-- 載入失敗 --</option>';
          alert("載入 dataset_id 失敗：" + String(err));
        }
      }

      document.getElementById("btn-load-datasets").addEventListener("click", loadDatasetIds);
      document.getElementById("dataset_id_select").addEventListener("change", function () {
        if (this.value) {
          document.getElementById("dataset_id").value = this.value;
          document.getElementById("ocr_dataset_id").value = this.value;
        }
      });

      document.getElementById("btn-run-ocr").addEventListener("click", async function () {
        const note = document.getElementById("manual-ocr-note");
        const datasetId = document.getElementById("ocr_dataset_id").value.trim().toLowerCase();
        const writeMode = document.getElementById("ocr_write_mode").value;
        if (!datasetId) {
          note.className = "small text-danger mt-2 mb-0";
          note.textContent = "請先輸入 dataset_id。";
          return;
        }
        const tok = document.getElementById("admin_token").value.trim();
        const headers = { "Content-Type": "application/json" };
        if (tok) headers["X-Admin-Token"] = tok;

        note.className = "small text-muted mt-2 mb-0";
        note.textContent = "OCR 執行中...";
        try {
          const res = await fetch("/delta/ocr/bronze/run", {
            method: "POST",
            headers,
            body: JSON.stringify({
              dataset_id: datasetId,
              write_mode: writeMode,
              dry_run: false,
            }),
          });
          const txt = await res.text();
          let data = {};
          try {
            data = JSON.parse(txt);
          } catch (_) {}
          if (!res.ok) {
            note.className = "small text-danger mt-2 mb-0";
            note.textContent = "OCR 失敗：" + ((data && data.error) || txt || res.statusText);
            return;
          }
          note.className = "small text-success mt-2 mb-0";
          note.textContent =
            "OCR 成功：dataset_id=" +
            (data.dataset_id || datasetId) +
            "，來源=" +
            (data.raw_images_path || "—");
        } catch (err) {
          note.className = "small text-danger mt-2 mb-0";
          note.textContent = "OCR 失敗：" + String(err);
        }
      });
    </script>
  </body>
</html>
